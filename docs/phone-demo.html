<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>手机演示模拟 · 沈阳盛京医疗联盟</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e8f4fb 0%, #edfaf5 50%, #f0f8ff 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: var(--font, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif);
    }

    /* ── 顶部导航 ── */
    .demo-bar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 36px;
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(63,143,202,.12);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .demo-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .demo-logo {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: linear-gradient(135deg, #7bc5e6, #60d0b0);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    .demo-title { font-size: 15px; font-weight: 700; color: #17384b; }
    .demo-sub   { font-size: 12px; color: var(--text-muted, #8ba4b4); margin-top: 2px; }

    .demo-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .d-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid rgba(63,143,202,.25);
      background: transparent;
      color: #17384b;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: background .16s, color .16s, border-color .16s;
      white-space: nowrap;
    }
    .d-btn:hover, .d-btn.active {
      background: var(--primary, #3f8fca);
      color: #fff;
      border-color: var(--primary, #3f8fca);
    }

    .d-divider {
      width: 1px;
      height: 20px;
      background: rgba(63,143,202,.2);
      margin: 0 4px;
    }

    /* ── 舞台 ── */
    .demo-stage {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 24px 56px;
    }

    /* ── 手机壳 ── */
    .demo-shell {
      width: 520px;
      max-width: calc(100vw - 48px);
      min-height: 1040px;
      background: linear-gradient(180deg, #f9fdff, #f6fbfc 22%, #ffffff 100%);
      border-radius: 52px;
      padding: 22px;
      border: 13px solid #1c2a33;
      box-shadow:
        0 40px 100px rgba(20,60,82,.22),
        0 8px 24px rgba(20,60,82,.10),
        inset 0 1px 0 rgba(255,255,255,.6);
      position: relative;
    }

    /* 顶部刘海 */
    .demo-shell::before {
      content: '';
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 28px;
      background: #1c2a33;
      border-radius: 0 0 18px 18px;
      z-index: 10;
      pointer-events: none;
    }

    /* 侧边按钮 */
    .demo-shell::after {
      content: '';
      position: absolute;
      right: -18px;
      top: 140px;
      width: 5px;
      height: 72px;
      background: #1c2a33;
      border-radius: 0 4px 4px 0;
      box-shadow: 0 84px 0 #1c2a33, 0 168px 0 #1c2a33;
    }

    /* ── 手机屏幕 ── */
    .demo-screen {
      background: linear-gradient(180deg, #f0fafb, #ffffff 20%);
      border-radius: 38px;
      height: 960px;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      scroll-behavior: smooth;
    }

    /* 隐藏滚动条（模拟手机效果） */
    .demo-screen::-webkit-scrollbar { display: none; }
    .demo-screen { -ms-overflow-style: none; scrollbar-width: none; }

    .demo-statusbar {
      display: flex;
      justify-content: space-between;
      font-size: 12.5px;
      color: var(--text-muted, #8ba4b4);
      padding: 16px 22px 8px;
    }

    /* 内容区 */
    #demoContent {
      padding-bottom: 80px;
    }

    /* 底部导航在独立演示页中固定在屏幕底部 */
    .demo-screen .phone-bottom-nav {
      position: sticky;
      bottom: 0;
      left: 0;
      right: 0;
      margin: 0 16px;
      z-index: 10;
    }

    /* ── 底部提示 ── */
    .demo-footer {
      width: 100%;
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: rgba(93,120,140,.45);
    }
  </style>
</head>
<body>

<!-- 顶部导航栏 -->
<header class="demo-bar">
  <div class="demo-brand">
    <div class="demo-logo">盛</div>
    <div>
      <div class="demo-title">手机演示模拟</div>
      <div class="demo-sub">沈阳盛京医疗联盟 · 儿童心理健康服务系统</div>
    </div>
  </div>

  <nav class="demo-nav" id="demoNav">
    <button class="d-btn active" data-page="c-home">首页</button>
    <button class="d-btn" data-page="c-education">科普</button>
    <button class="d-btn" data-page="c-doctors">预约</button>
    <button class="d-btn" data-page="c-appointments">我的预约</button>
    <button class="d-btn" data-page="c-favorites">收藏</button>
    <div class="d-divider"></div>
    <a class="d-btn" href="/" target="_blank">完整系统 ↗</a>
  </nav>
</header>

<!-- 手机主体 -->
<main class="demo-stage">
  <div class="demo-shell">
    <div class="demo-screen">
      <div class="demo-statusbar">
        <span id="demoTime">09:41</span>
        <span>5G &nbsp; 98%</span>
      </div>
      <div id="demoContent"></div>
    </div>
  </div>
</main>

<footer class="demo-footer">点击上方导航切换页面 · 所有操作均调用真实 API · 数据与后台系统实时同步</footer>

<!-- 复用后台 JS -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/components.js"></script>

<script>
/* ═══════════════════════════════════════════════
   手机演示模拟 · 独立页脚本
   复用主系统 API 层，自包含所有页面渲染函数
═══════════════════════════════════════════════ */

// ── 实时时钟 ──
(function tickClock() {
  const n = new Date();
  const t = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  const el = document.getElementById('demoTime');
  if (el) el.textContent = t;
  setTimeout(tickClock, 10000);
})();

// ── 演示状态 ──
let _selectedDoctorId = '1';
let _selectedSlot     = null;
let _lastAppt         = null;
let _currentArticle   = null;

// ── 路由 ──
// 让复用函数能调用 DemoRouter.navigate
window.Router = { navigate(page) { goto(page); } };

function goto(pageId, fromNav) {
  if (fromNav) {
    document.querySelectorAll('#demoNav .d-btn[data-page]').forEach(b =>
      b.classList.toggle('active', b.dataset.page === pageId));
  }
  renderDemoPage(pageId);
}

// 顶部导航点击
document.querySelectorAll('#demoNav .d-btn[data-page]').forEach(btn => {
  btn.addEventListener('click', () => goto(btn.dataset.page, true));
});

// ── 骨架屏 ──
function skeleton() {
  return `<div style="padding:20px 18px">
    <div class="skeleton" style="width:55%;height:20px;border-radius:8px;margin-bottom:8px"></div>
    <div class="skeleton" style="width:75%;height:13px;border-radius:6px;margin-bottom:20px"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="skeleton" style="height:116px;border-radius:18px"></div>
      <div class="skeleton" style="height:116px;border-radius:18px"></div>
    </div>
    <div class="skeleton" style="height:68px;border-radius:14px;margin-bottom:10px"></div>
    <div class="skeleton" style="height:68px;border-radius:14px;margin-bottom:10px"></div>
    <div class="skeleton" style="height:68px;border-radius:14px"></div>
  </div>`;
}

// ── 主渲染 ──
async function renderDemoPage(pageId) {
  const el = document.getElementById('demoContent');
  const screen = document.querySelector('.demo-screen');
  if (screen) screen.scrollTop = 0;
  el.innerHTML = skeleton();
  try {
    let html = '';
    switch (pageId) {
      case 'c-home':               html = pageCHome();                          break;
      case 'c-education':          html = await pageCEducationList();           break;
      case 'c-education-detail':   html = await pageCEducationDetail();         break;
      case 'c-doctors':            html = await pageCDoctors();                 break;
      case 'c-doctor-detail':      html = await pageCDoctorDetail();            break;
      case 'c-appointment-confirm':html = pageCAppointmentConfirm();            break;
      case 'c-appt-success':       html = pageCApptSuccess();                   break;
      case 'c-me':                 html = pageCMe();                            break;
      case 'c-appointments':       html = await pageCAppointments();            break;
      case 'c-favorites':          html = await pageCFavorites();               break;
      default:                     html = pageCHome();
    }
    // 从 phone-stage 包装中提取手机内部各部分
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    const phoneTop     = tmp.querySelector('.phone-top');
    const phoneContent = tmp.querySelector('.phone-content');
    const phoneNav     = tmp.querySelector('.phone-bottom-nav');
    const floatHelp    = tmp.querySelector('.floating-help');
    el.innerHTML = '';
    if (phoneTop)     el.appendChild(phoneTop);
    if (phoneContent) el.appendChild(phoneContent);
    if (floatHelp)    el.appendChild(floatHelp);
    if (phoneNav)     el.appendChild(phoneNav);
  } catch (err) {
    el.innerHTML = `<div style="padding:36px 20px;text-align:center;color:#8ba4b4">
      <div style="font-size:36px;margin-bottom:14px">⚠️</div>
      <div style="font-weight:600;color:#17384b;margin-bottom:8px">加载失败</div>
      <div style="font-size:13px">请确认后台服务已在 8000 端口启动</div>
      <div style="font-size:11px;margin-top:8px;opacity:.6">${err.message}</div>
      <button onclick="renderDemoPage('c-home')" style="margin-top:20px;padding:8px 20px;border-radius:20px;border:1.5px solid #3f8fca;background:transparent;color:#3f8fca;cursor:pointer">刷新重试</button>
    </div>`;
  }
}

/* ═══════ 工具函数 ═══════ */

function docAvatar(name, size, avatarIdx) {
  const s = size || 78;
  const i = (avatarIdx !== undefined ? avatarIdx : name.charCodeAt(0)) % 4 + 1;
  const r = Math.round(s * 0.26);
  return `<img src="img/h${i}.png" style="width:${s}px;height:${s}px;border-radius:${r}px;object-fit:cover;flex-shrink:0" alt="${name[0]}" />`;
}

function filterChips(wrap, clicked) {
  wrap.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  clicked.classList.add('active');
}

function openArticle(id) {
  _currentArticle = id;
  renderDemoPage('c-education-detail');
}

function selectSlot(slot) {
  _selectedSlot = slot;
  renderDemoPage('c-appointment-confirm');
}

async function confirmAppointment(doctorId, slotId) {
  const btn       = document.getElementById('confirmBtn');
  const childName = document.getElementById('childName')?.value || '沈小安';
  const age       = document.getElementById('childAge')?.value  || '8';
  const symptoms  = document.getElementById('symptoms')?.value  || '';
  if (btn) { btn.disabled = true; btn.textContent = '提交中…'; }
  try {
    const appt = await API.post('/appointments', {
      doctorId: doctorId || _selectedDoctorId || '1',
      slotId:   slotId   || _selectedSlot?.id || 'slot-1-2026-05-18-am',
      childName, age, symptoms,
    });
    _lastAppt = appt;
    renderDemoPage('c-appt-success');
  } catch (_) {
    if (btn) { btn.disabled = false; btn.textContent = '确认预约'; }
  }
}

async function toggleFavorite(articleId, title, type, desc) {
  try {
    await API.post('/favorites', { articleId, title, type, desc });
    UI.toast('已收藏到我的收藏', 'success');
    const btn = document.getElementById('favBtn');
    if (btn) { btn.textContent = '♥ 已收藏'; btn.disabled = true; }
  } catch (_) {}
}

async function cancelAppt(id) {
  if (!confirm('确认取消本次预约吗？')) return;
  try {
    await API.patch('/appointments/' + id + '/cancel');
    UI.toast('预约已取消，号源已恢复', 'warning');
    renderDemoPage('c-appointments');
  } catch (_) {}
}

function detailListRow(label, value) {
  return `<div class="detail-list-item"><span class="muted">${label}</span><span>${value}</span></div>`;
}

function mobileTab(icon, label, page, active) {
  return `<button class="${active ? 'active' : ''}" onclick="goto('${page}',true)">
    <span>${icon}</span><span>${label}</span>
  </button>`;
}

function quickItem(icon, label, page) {
  const action = page ? `onclick="goto('${page}',true)"` : '';
  return `<button class="quick-item" ${action}><span>${icon}</span><span>${label}</span></button>`;
}

/* ═══════ renderPatientPage：仅输出 phone-stage 包装 ═══════ */
function renderPatientPage({ title, content, activeTab='home', floatingHelp=false, backPage=null }) {
  const header = backPage
    ? `<div class="phone-back-bar">
        <button class="phone-back-btn" onclick="goto('${backPage}')">← 返回</button>
        <span style="font-weight:600;font-size:14px">${title}</span>
        <span style="width:54px"></span>
       </div>`
    : `<div class="app-brand">
        <div style="display:flex;gap:12px;align-items:center">
          <div class="brand-mark">盛</div>
          <div>
            <div style="font-weight:700">沈阳盛京医疗联盟</div>
            <div class="muted" style="font-size:12px;margin-top:4px">儿童心理健康服务</div>
          </div>
        </div>
        <button class="icon-btn" onclick="UI.toast('已联系值班护士','info')">☎</button>
       </div>`;
  return `<div class="phone-stage"><div class="phone-shell"><div class="phone-screen">
    <div class="phone-top">${header}</div>
    <div class="phone-content">${content}</div>
    ${floatingHelp ? '<button class="floating-help" onclick="UI.toast(\'已呼起紧急求助热线\',\'warning\')">紧急求助</button>' : ''}
    <div class="phone-bottom-nav">
      ${mobileTab('🏠','首页','c-home',activeTab==='home')}
      ${mobileTab('🩺','预约','c-doctors',activeTab==='reserve')}
      ${mobileTab('👨‍👩‍👧','我的','c-me',activeTab==='me')}
    </div>
  </div></div></div>`;
}

/* ═══════ C端页面 ═══════ */

function pageCHome() {
  const content = `
    <div class="mobile-banner">
      <div class="chip active" style="margin-bottom:10px;width:max-content">沈阳盛京医疗联盟</div>
      <div style="font-size:22px;font-weight:700;line-height:1.35">儿童心理健康服务</div>
      <div class="muted" style="margin-top:8px;line-height:1.7">为家长提供心理科普、绿色预约、测评回顾和紧急支持。</div>
      <img src="img/pic2.png" style="width:100%;height:110px;object-fit:cover;border-radius:12px;margin-top:12px" alt="" />
    </div>
    <div class="entry-grid">
      <button class="entry-card primary" onclick="goto('c-education',true)">
        <div style="font-size:28px">📚</div>
        <strong>心理科普</strong>
        <div class="muted">图文与视频内容，帮助家长理解孩子心理状态</div>
      </button>
      <button class="entry-card secondary" onclick="goto('c-doctors',true)">
        <div style="font-size:28px">🩺</div>
        <strong>门诊预约</strong>
        <div class="muted">绿色预约通道，快速匹配儿童心理专科医生</div>
      </button>
    </div>
    <div style="font-weight:600;margin:6px 0 10px">快捷入口</div>
    <div class="quick-grid">
      ${quickItem('🧪','我的测评','')}
      ${quickItem('📅','我的预约','c-appointments')}
      ${quickItem('❤️','我的收藏','c-favorites')}
      ${quickItem('☎️','咨询热线','')}
    </div>
    <div class="flow-card" style="padding:16px;background:linear-gradient(135deg,#fff,#f6fcfa)">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <div>
          <div style="font-weight:700">本周推荐</div>
          <div class="muted" style="margin-top:4px">儿童焦虑早筛与家庭沟通专题</div>
        </div>
        <button class="btn btn-sm btn-primary" onclick="openArticle('a1')">去查看</button>
      </div>
    </div>`;
  return renderPatientPage({ title:'首页', activeTab:'home', content, floatingHelp:true });
}

async function pageCEducationList() {
  const articles = await API.get('/articles');
  const content = `
    <div class="form-group" style="margin-bottom:12px">
      <input class="form-control" placeholder="搜索科普文章、视频、专家讲座" />
    </div>
    <div class="chip-row" id="eduChips" style="margin-bottom:14px">
      ${['全部','情绪管理','学习压力','专家讲座','亲子沟通'].map((t,i) =>
        `<span class="chip ${i===0?'active':''}" onclick="filterChips(document.getElementById('eduChips'),this)">${t}</span>`
      ).join('')}
    </div>
    ${articles.map(a => `
      <button class="mobile-list-item" onclick="openArticle('${a.id}')">
        <img class="content-thumb" src="img/pic${((parseInt(a.id.replace(/\D/g,''))||1)-1)%11+1}.png" alt="" />
        <div class="mobile-list-body">
          <div class="chip active" style="margin-bottom:8px;width:max-content">${a.tag} · ${a.type}</div>
          <div style="font-weight:700;line-height:1.5;margin-bottom:6px">${a.title}</div>
          <div class="muted" style="line-height:1.6">${a.summary}</div>
        </div>
      </button>`).join('')}`;
  return renderPatientPage({ title:'心理健康科普', activeTab:'home', content });
}

async function pageCEducationDetail() {
  let article;
  try {
    article = await API.get('/articles/' + (_currentArticle || 'a1'));
  } catch (_) {
    article = { id:'a1', title:'孩子发脾气时，家长如何做情绪接纳', type:'图文', tag:'情绪管理', summary:'用陪伴、命名情绪和稳定边界，帮助孩子更快恢复平静状态。', reads:1286 };
  }
  const content = `
    <div class="mobile-card" style="overflow:hidden;margin-bottom:14px">
      <div style="height:188px;position:relative;overflow:hidden">
        <img src="img/pic${((parseInt((article.id||'a1').replace(/\D/g,''))||1)-1)%11+1}.png" style="width:100%;height:100%;object-fit:cover;display:block" alt="${article.title}" />
        ${article.type==='视频' ? '<div class="play-overlay">▶</div>' : ''}
      </div>
      <div class="content-card-body">
        <div class="chip active" style="margin-bottom:10px;width:max-content">${article.tag} · ${article.type}</div>
        <div style="font-size:17px;font-weight:700;line-height:1.5;margin-bottom:10px">${article.title}</div>
        <div class="muted" style="line-height:1.8">${article.summary}</div>
        <div class="muted" style="margin-top:8px;font-size:12px">阅读量：${(article.reads||0).toLocaleString()}</div>
      </div>
    </div>
    <div class="hero-actions">
      <button class="btn btn-outline" id="favBtn"
        onclick="toggleFavorite('${article.id}','${article.title.replace(/'/g,"&#39;")}','${article.type}','${article.summary.slice(0,30).replace(/'/g,"&#39;")}')">
        ♡ 收藏
      </button>
      <button class="btn btn-primary" onclick="UI.toast('分享链接已复制','info')">↗ 分享</button>
    </div>`;
  return renderPatientPage({ title:'科普详情', activeTab:'home', backPage:'c-education', content });
}

async function pageCDoctors() {
  const doctors = await API.get('/doctors');
  const content = `
    <div class="chip-row" id="docChips" style="margin-bottom:14px">
      ${['全部科室','儿童焦虑','多动症','学习压力','睡眠问题'].map((t,i) =>
        `<span class="chip ${i===0?'active':''}" onclick="filterChips(document.getElementById('docChips'),this)">${t}</span>`
      ).join('')}
    </div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">共 ${doctors.length} 位在职心理专科医生可预约</div>
    <div class="doctor-grid">
      ${doctors.map((d, dIdx) => `
        <button class="doctor-card" onclick="_selectedDoctorId='${d.id}';goto('c-doctor-detail')">
          ${docAvatar(d.name, undefined, dIdx)}
          <div style="text-align:left;flex:1">
            <div style="display:flex;justify-content:space-between;gap:12px;align-items:start">
              <div>
                <div style="font-weight:700;font-size:17px">${d.name}</div>
                <div class="muted" style="margin-top:4px">${d.title} · ${d.dept}</div>
              </div>
              <span class="score-pill">★ ${d.score}</span>
            </div>
            <div class="doctor-tags" style="margin:10px 0 8px">
              ${d.skill.split(' / ').map(t => `<span class="chip active">${t}</span>`).join('')}
            </div>
            <div class="muted" style="line-height:1.6">${d.intro}</div>
          </div>
        </button>`).join('')}
    </div>`;
  return renderPatientPage({ title:'门诊预约', activeTab:'reserve', content });
}

async function pageCDoctorDetail() {
  const id = _selectedDoctorId || '1';
  const [doctor, slots] = await Promise.all([API.get('/doctors/'+id), API.get('/doctors/'+id+'/slots')]);
  const avail = slots.filter(s => s.remain > 0).reduce((s,x) => s + x.remain, 0);
  const dn = ['日','一','二','三','四','五','六'];
  const content = `
    <div class="mobile-card" style="padding:18px;margin-bottom:14px">
      <div style="display:flex;gap:14px;align-items:center;margin-bottom:14px">
        ${docAvatar(doctor.name, 92, parseInt(doctor.id)-1)}
        <div>
          <div style="font-size:18px;font-weight:700">${doctor.name}</div>
          <div class="muted" style="margin:6px 0">${doctor.title} · ${doctor.dept}</div>
          <div class="doctor-tags">
            ${doctor.skill.split(' / ').map(t => `<span class="chip active">${t}</span>`).join('')}
          </div>
        </div>
      </div>
      <div class="muted" style="line-height:1.8">${doctor.intro}</div>
    </div>
    <div class="slot-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <strong>本周可预约时间</strong>
        <span class="status-pill">可预约 ${avail} 个号源</span>
      </div>
      <div class="week-slots">
        ${slots.slice(0,14).map(slot => {
          const day = '周' + dn[new Date(slot.date).getDay()];
          const ok  = slot.remain > 0 && slot.total > 0;
          const sj  = JSON.stringify(slot).replace(/"/g, '&quot;');
          return `<button class="time-slot ${ok?'active':'disabled'}"
            ${ok ? `onclick="selectSlot(JSON.parse(this.dataset.slot))" data-slot="${sj}"` : 'disabled'}>
            ${day} ${slot.time}<br><span style="font-size:10px;opacity:.7">${ok ? '余'+slot.remain : '已满'}</span>
          </button>`;
        }).join('')}
      </div>
    </div>`;
  return renderPatientPage({ title:'医生详情', activeTab:'reserve', backPage:'c-doctors', content });
}

function pageCAppointmentConfirm() {
  const slot   = _selectedSlot;
  const docId  = _selectedDoctorId || '1';
  const slotId = slot ? slot.id   : 'slot-1-2026-05-18-am';
  const date   = slot ? slot.date : '2026-05-18';
  const time   = slot ? slot.time : '09:30';
  const content = `
    <div class="appointment-summary">
      <div style="font-weight:700;font-size:17px;margin-bottom:10px">已选预约信息</div>
      ${detailListRow('医生编号', docId)}
      ${detailListRow('日期', date)}
      ${detailListRow('时间', time)}
      ${detailListRow('门诊', '儿童心理门诊 2诊室')}
    </div>
    <div class="mobile-card" style="padding:18px;margin-bottom:14px">
      <div class="form-group">
        <label class="form-label">就诊儿童姓名</label>
        <input class="form-control" id="childName" value="沈小安" />
      </div>
      <div class="form-group">
        <label class="form-label">年龄</label>
        <input class="form-control" id="childAge" value="8 岁" />

}

function pageCApptSuccess() {
  const appt    = _lastAppt;
  const docName = appt?.doctorName || '刘敏';
  const date    = appt?.slotInfo?.date || '2026-05-18';
  const time    = appt?.slotInfo?.time || '09:30';
  const apptId  = appt?.id || ('SJ' + Date.now());
  const content = `
    <div style="text-align:center;padding:32px 16px 20px">
      <div class="success-ring">✓</div>
      <div style="font-size:21px;font-weight:700;margin-bottom:8px">预约成功！</div>
      <div class="muted" style="line-height:1.8">已成功预约${docName}医师<br/>${date} ${time}</div>
    </div>
    <div class="appointment-summary" style="margin-bottom:14px">
      ${detailListRow('订单编号', apptId)}

      <button class="btn btn-outline" onclick="goto('c-home',true)">返回首页</button>
    </div>`;
  return renderPatientPage({ title:'预约成功', activeTab:'reserve', content });
}

async function pageCAppointments() {
  const appts = await API.get('/appointments?userId=demo-user');
  const sc = {
    pending:   '#128062,#eaf8f3',
    completed: '#657b8c,#eef2f5',
    cancelled: '#d93f5d,#fff0f2'
  };
  const content = appts.length === 0
    ? `<div class="empty-state">
        <div class="empty-icon">📅</div>
        <div class="empty-title">暂无预约记录</div>
        <div class="empty-desc">前往门诊预约页面预约</div>
        <button class="btn btn-primary" style="margin-top:14px" onclick="goto('c-doctors',true)">去预约</button>
       </div>`
    : `<div class="timeline">${appts.map(item => {
        const label = item.statusLabel || item.status;
        const [tc, bg] = (sc[item.status] || '#3f8fca,#eef6ff').split(',');
        return `<div class="timeline-item"><div class="timeline-body">
          <div style="display:flex;justify-content:space-between;gap:12px;align-items:start">
            <div>
              <div style="font-weight:700">${item.displayTime}</div>
              <div class="muted" style="margin-top:6px">${item.doctorName} ${item.doctorTitle}</div>
              <div class="muted" style="font-size:12px">患儿：${item.childName}</div>
            </div>
            <span class="status-pill" style="background:${bg};color:${tc}">${label}</span>
          </div>
          ${item.status === 'pending' ? `<div style="margin-top:10px">
            <button class="btn btn-danger btn-sm" onclick="cancelAppt('${item.id}')">取消预约</button>
          </div>` : ''}
        </div></div>`;
      }).join('')}</div>`;
  return renderPatientPage({ title:'我的预约', activeTab:'me', content });
}

async function pageCFavorites() {
  const favs = await API.get('/favorites?userId=demo-user');
  const content = favs.length === 0
    ? `<div class="empty-state">
        <div class="empty-icon">❤️</div>
        <div class="empty-title">暂无收藏</div>
        <div class="empty-desc">浏览科普内容时点击"收藏"即可保存</div>
        <button class="btn btn-primary" style="margin-top:14px" onclick="goto('c-education',true)">去浏览科普</button>
       </div>`
    : favs.map(item => `
      <div class="favorite-item">
        <img class="content-thumb" src="img/pic${((parseInt((item.articleId||'a1').replace(/\D/g,''))||1)-1)%11+1}.png" alt="" />
        <div class="favorite-body">
          <div class="chip active" style="margin-bottom:8px;width:max-content">${item.type}</div>
          <div style="font-weight:700;margin-bottom:8px;line-height:1.6">${item.title}</div>
          <div class="muted" style="line-height:1.6">${item.desc}</div>
        </div>
      </div>`).join('');
  return renderPatientPage({ title:'我的收藏', activeTab:'me', content });
}
